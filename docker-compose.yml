
services:
  api:
    build: .
    container_name: treinopro-api
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - treinopro-network

  postgres:
    image: postgres:15-alpine
    container_name: treinopro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/treinopro/postgres_data:/var/lib/postgresql/data
    networks:
      - treinopro-network

  redis:
    image: redis:7-alpine
    container_name: treinopro-redis
    restart: unless-stopped
    volumes:
      - /var/lib/treinopro/redis_data:/data
    networks:
      - treinopro-network

networks:
  treinopro-network:
    driver: bridge
