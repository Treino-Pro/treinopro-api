services:
  api:
    build:
      context: .                # Usa o Dockerfile na raiz do projeto
      dockerfile: Dockerfile
    container_name: treinopro-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3000}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - treinopro-network


  postgres:
    image: postgres:15-alpine
    container_name: treinopro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-treinopro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - /var/lib/treinopro/postgres_data:/var/lib/postgresql/data
    networks:
      - treinopro-network
    ports:
      - "5432:5432"   

  redis:
    image: redis:7-alpine
    container_name: treinopro-redis
    restart: unless-stopped
    volumes:
      - /var/lib/treinopro/redis_data:/data
    networks:
      - treinopro-network
    ports:
      - "6379:6379"   

networks:
  treinopro-network:
    driver: bridge
