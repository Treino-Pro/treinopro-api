services:
  postgres:
    image: postgres:15-alpine
    container_name: treinopro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-treinopro}
      POSTGRES_USER: ${POSTGRES_USER:-treinopro-api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Zm8]9K:^vUP7a$55i}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    volumes:
      - /var/lib/treinopro/postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - treinopro-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-treinopro-api}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: treinopro-redis
    restart: unless-stopped
    volumes:
      - /var/lib/treinopro/redis_data:/data
    networks:
      - treinopro-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: treinopro-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3000}
      TZ: America/Sao_Paulo
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - treinopro-network
    command: sh -c "sleep 5 && yarn"

networks:
  treinopro-network:
    driver: bridge